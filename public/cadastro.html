<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Radar F1</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/cadastro.css">
</head>
<body>
    <main class="container-cadastro">
        <section class="box-cadastro">

            <h2 class="campo-base">Vamos começar com você!</h2>

            <div class="campo">
                <p>Nome:</p>
                <input type="text" id="input_nome" required>
            </div>

            <div class="campo">
                <p>Email:</p>
                <input type="email" id="input_email" required>
            </div>

            <h2 class="campo-favorito">Agora preencha seus favoritos!</h2>

            <div class="campo">
                <p>Equipe:</p>

                <select id="input_equipe" onchange="trocarEquipe()" required>
                    <option value="" disabled selected>Selecione uma equipe</option>

                    <option value="1">Alpine</option>
                    <option value="2">Aston Martin</option>
                    <option value="3">Audi</option>
                    <option value="4">Cadillac</option>
                    <option value="5">Ferrari</option>
                    <option value="6">Haas</option>
                    <option value="7">McLaren</option>
                    <option value="8">Mercedes</option>
                    <option value="9">Racing Bulls</option>
                    <option value="10">Red Bull</option>
                    <option value="11">Williams</option>

                    <option value="12">Não sei</option>
                    <option value="13">Outra</option>
                </select>
            </div>

            <div class="campo">
                <p>Piloto:</p>

                <select id="input_piloto" required>
                    <option value="" disabled selected>Selecione um piloto</option>

                    <option value="1">Alex Albon</option>
                    <option value="2">Andrea Kimi Antonelli</option>
                    <option value="3">Arvid Lindblad</option>
                    <option value="4">Carlos Sainz</option>
                    <option value="5">Charles Leclerc</option>
                    <option value="6">Esteban Ocon</option>
                    <option value="7">Fernando Alonso</option>
                    <option value="8">Franco Colapinto</option>
                    <option value="9">Gabriel Bortoleto</option>
                    <option value="10">George Russell</option>
                    <option value="11">Isack Hadjar</option>
                    <option value="12">Lance Stroll</option>
                    <option value="13">Lando Norris</option>
                    <option value="14">Lewis Hamilton</option>
                    <option value="15">Liam Lawson</option>
                    <option value="16">Max Verstappen</option>
                    <option value="17">Nico Hülkenberg</option>
                    <option value="18">Oliver Bearman</option>
                    <option value="19">Oscar Piastri</option>
                    <option value="20">Pierre Gasly</option>
                    <option value="21">Sergio Perez</option>
                    <option value="22">Valtteri Bottas</option>

                    <option value="23">Não sei</option>
                    <option value="24">Outro</option>
                </select>
            </div>

            <div class="campo">
                <p>Circuito:</p>

                <select id="input_circuito" required>
                    <option value="" disabled selected>Selecione um circuito</option>

                    <option value="1">GP de Abu Dhabi</option>
                    <option value="2">GP da Arábia Saudita</option>
                    <option value="3">GP da Austrália</option>
                    <option value="4">GP da Áustria</option>
                    <option value="5">GP do Azerbaijão</option>
                    <option value="6">GP da Bélgica</option>
                    <option value="7">GP de São Paulo</option>
                    <option value="8">GP do Canadá</option>
                    <option value="9">GP do Catar</option>
                    <option value="10">GP da China</option>
                    <option value="11">GP da Emília-Romanha</option>
                    <option value="12">GP da Espanha (Madrid)</option>
                    <option value="13">GP dos Estados Unidos</option>
                    <option value="14">GP de Las Vegas</option>
                    <option value="15">GP de Miami</option>
                    <option value="16">GP da Holanda</option>
                    <option value="17">GP da Hungria</option>
                    <option value="18">GP da Itália</option>
                    <option value="19">GP do Japão</option>
                    <option value="20">GP da Cidade do México</option>
                    <option value="21">GP de Mônaco</option>
                    <option value="22">GP da Grã-Bretanha</option>
                    <option value="23">GP de Singapura</option>

                    <option value="24">Não sei</option>
                    <option value="25">Outra</option>
                </select>
            </div>

            <div class="campo">
                <p>Temporada:</p>

                <select id="input_temporada" required>
                    <option value="" disabled selected>Selecione uma temporada</option>

                    <option value="1">1950</option>
                    <option value="2">1961</option>
                    <option value="3">1968</option>
                    <option value="4">1976</option>
                    <option value="5">1984</option>
                    <option value="6">1988</option>
                    <option value="7">1989</option>
                    <option value="8">1991</option>
                    <option value="9">1994</option>
                    <option value="10">1998</option>
                    <option value="11">2000</option>
                    <option value="12">2003</option>
                    <option value="13">2007</option>
                    <option value="14">2008</option>
                    <option value="15">2010</option>
                    <option value="16">2012</option>
                    <option value="17">2014</option>
                    <option value="18">2016</option>
                    <option value="19">2018</option>
                    <option value="20">2021</option>
                    <option value="21">2022</option>
                    <option value="22">2023</option>
                    <option value="23">2024</option>
                    <option value="24">2025</option>

                    <option value="25">Não sei</option>
                    <option value="26">Outra</option>
                </select>
            </div>

            <div class="campo">
                <p>Rivalidade:</p>

                <select id="input_rivalidade" required>
                    <option value="" disabled selected>Selecione uma rivalidade</option>

                    <option value="1">Senna vs Prost</option>
                    <option value="2">Hamilton vs Verstappen</option>
                    <option value="3">Lauda vs Hunt</option>
                    <option value="4">Schumacher vs Hakkinen</option>
                    <option value="5">Vettel vs Alonso</option>
                    <option value="6">Piquet vs Mansell</option>
                    <option value="7">Rosberg vs Hamilton</option>
                    <option value="8">Senna vs Mansell</option>

                    <option value="9">Não sei</option>
                    <option value="10">Outra</option>
                </select>
            </div>

            <div class="campo">
                <p>Quanto tempo você acompanha:</p>

                <select id="input_acompanhamento" required>
                    <option value="" disabled selected>Selecione uma opção</option>

                    <option value="Menos de 1 ano">Menos de 1 ano</option>
                    <option value="Entre 1 a 3 anos">Entre 1 a 3 anos</option>
                    <option value="Entre 3 a 5 anos">Entre 3 a 5 anos</option>
                    <option value="Entre 5 e 10 anos">Entre 5 e 10 anos</option>
                    <option value="Mais de 10 anos">Mais de 10 anos</option>
                </select>
            </div>

            <h2 class="campo-finalizar">Ótimo, agora vamos colocar uma senha!</h2>

            <div class="campo">
                <p>Senha:</p>
                <input type="password" id="input_senha">
            </div>

            <div class="campo">
                <p>Confirmar senha:</p>
                <input type="password" id="input_confirmarSenha">
            </div>

            <button class="btn-cadastrar" onclick="cadastrar()">Cadastrar</button>
        </section>

        <section class="painel-equipe" id="painel_equipe">

            <div class="conteudo-painel">
                <h1 id="titulo_equipe">Escolha sua equipe</h1>
                <p id="descricao_equipe">
                    Descubra informações sobre sua equipe favorita.
                </p>
            </div>

        </section>
    </main>
<script>
    const painel = document.getElementById("painel_equipe");
    const titulo = document.getElementById("titulo_equipe");
    const descricao = document.getElementById("descricao_equipe");

    function trocarEquipe() {

        const equipe = input_equipe.value;

        if (equipe == 1) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/alpine.jpg')";

            titulo.innerHTML = "Alpine";
            descricao.innerHTML =
            "A Alpine representa a tradição francesa na Fórmula 1, buscando evolução constante e novos talentos para voltar ao topo do grid.";
        }

        if (equipe == 2) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/astonmartin.jpg')";

            titulo.innerHTML = "Aston Martin";
            descricao.innerHTML =
            "A Aston Martin combina elegância, investimento pesado e ambição para disputar posições cada vez maiores na Fórmula 1.";
        }

        if (equipe == 3) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/audi.jpg')";

            titulo.innerHTML = "Audi";
            descricao.innerHTML =
            "A Audi chega à Fórmula 1 trazendo inovação, tecnologia alemã e expectativa de se tornar uma potência no futuro da categoria.";
        }

        if (equipe == 4) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/cadillac.jpg')";

            titulo.innerHTML = "Cadillac";
            descricao.innerHTML =
            "A Cadillac entra na Fórmula 1 carregando o peso da tradição americana e a vontade de marcar uma nova era no automobilismo.";
        }

        if (equipe == 5) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/ferrari.jpg')";

            titulo.innerHTML = "Ferrari";
            descricao.innerHTML =
            "A Ferrari é a equipe mais histórica da Fórmula 1, conhecida pela paixão italiana, títulos lendários e torcida gigantesca.";
        }

        if (equipe == 6) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/haas.jpg')";

            titulo.innerHTML = "Haas";
            descricao.innerHTML =
            "A Haas representa os Estados Unidos na Fórmula 1 e busca crescer utilizando estratégia inteligente e jovens pilotos.";
        }

        if (equipe == 7) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/mclaren.jpg')";

            titulo.innerHTML = "McLaren";
            descricao.innerHTML =
            "A McLaren é uma das equipes mais tradicionais da história, marcada por carros icônicos, grandes campeões e inovação.";
        }

        if (equipe == 8) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/mercedes.jpg')";

            titulo.innerHTML = "Mercedes";
            descricao.innerHTML =
            "A Mercedes dominou a era híbrida da Fórmula 1 com tecnologia avançada, consistência e múltiplos campeonatos mundiais.";
        }

        if (equipe == 9) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/racingbulls.jpg')";

            titulo.innerHTML = "Racing Bulls";
            descricao.innerHTML =
            "A Racing Bulls é conhecida por desenvolver jovens talentos e preparar pilotos para grandes oportunidades dentro da Fórmula 1.";
        }

        if (equipe == 10) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/redbull.jpg')";

            titulo.innerHTML = "Red Bull";
            descricao.innerHTML =
            "A Red Bull revolucionou a Fórmula 1 com agressividade, inovação aerodinâmica e uma mentalidade extremamente competitiva.";
        }

        if (equipe == 11) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe/williams.jpg')";

            titulo.innerHTML = "Williams";
            descricao.innerHTML =
            "A Williams é uma equipe lendária da Fórmula 1, carregando décadas de história, títulos e tradição no automobilismo.";
        }

        if (equipe == 12 || equipe == 13) {
            painel.style.backgroundImage =
            "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('./assets/equipe-f1.png')";

            titulo.innerHTML = "Escolha sua equipe";
            descricao.innerHTML =
            "Descubra informações sobre sua equipe favorita.";
        }

    }

    function cadastrar() {
        
    }
</script>
</body>
</html>
